name: Bug Report
description: Report a bug in chtype
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code snippet or repo that reproduces the issue.
      render: typescript
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: chtype version
      placeholder: "0.8.0"
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node.js
        - Bun
    validations:
      required: true
